<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    background: linear-gradient(
        135deg,
        #ffd6e8 0%,
        #dce8ff 50%,
        #ead9ff 100%
    );
    padding: 40px 20px;
}

/* Título */
h1{
    text-align: center;
    color: #7a5fcf;
    font-size: 2.5rem;
    margin-bottom: 30px;
    text-shadow: 2px 2px 8px rgba(255,255,255,.8);
}

/* Contenedor enlace */
div{
    display: flex;
    justify-content: center;
    margin-bottom: 30px;
}

/* Botón Alta */
a{
    text-decoration: none;
    padding: 12px 25px;
    border-radius: 15px;
    font-weight: 600;
    color: white;
    background: linear-gradient(
        135deg,
        #ff9dcf,
        #9bbcff,
        #c8a7ff
    );
    transition: .3s;
    box-shadow: 0 5px 15px rgba(180,150,255,.3);
}

a:hover{
    transform: translateY(-3px);
    box-shadow: 0 10px 20px rgba(180,150,255,.4);
}

/* Tabla */
table{
    width: 100%;
    max-width: 1200px;
    margin: auto;
    border-collapse: collapse;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(10px);
    border-radius: 25px;
    overflow: hidden;
    box-shadow:
        0 10px 30px rgba(0,0,0,.1),
        0 0 20px rgba(180,160,255,.2);
}

/* Cabecera */
thead{
    background: linear-gradient(
        135deg,
        #ff9dcf,
        #bba4ff
    );
}

thead th{
    color: white;
    padding: 18px;
    font-size: 15px;
    font-weight: 600;
    text-align: center;
}

/* Filas */
tbody td{
    padding: 16px;
    text-align: center;
    color: #5d4b91;
    border-bottom: 1px solid #ece5ff;
}

/* Zebra */
tbody tr:nth-child(even){
    background: rgba(245,240,255,.5);
}

/* Hover */
tbody tr:hover{
    background: rgba(220,230,255,.8);
    transition: .3s;
}

/* Última fila */
tbody tr:last-child td{
    border-bottom: none;
}

/* Responsive */
@media(max-width: 900px){

    body{
        padding: 20px 10px;
    }

    table{
        display: block;
        overflow-x: auto;
        white-space: nowrap;
    }

    h1{
        font-size: 2rem;
    }
}
</style>

<body>
	<h1>Listado de Empleados</h1>
	
	<div>
		<a th:href="@{/empleados/alta}">Alta Empleado</a>
	</div>
	
	<table>
		<thead>
            <tr>
                <th>Nombre</th>
                <th>Primer Apellido</th>
                <th>Segundo Apellido</th>
                <th>Genero</th>
                <th>Salario</th>
                <th>Fecha de Alta</th>
            </tr>
            </thead>
            <tbody>
            		<tr th:each="empleado : ${empleados}">
            			<td th:text="${empleado.nombre}"></td>
            			<td th:text="${empleado.primerApellido}"></td>
            			<td th:text="${empleado.segundoApellido}"></td>
            			<td th:text="${empleado.genero}"></td>
            			<td th:text="${empleado.salario}"></td>
            			<td th:text="${empleado.fechaAlta}"></td>
            		</tr>
            </tbody>
	</table>
</body>
</html>
