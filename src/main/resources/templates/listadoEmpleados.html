<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
        <h1>Listado de Empleados</h1>
    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Primer Apellido</th>
                <th>Segundo Apellido</th>
                <th>Genero</th>
                <th>Salario</th>
                <th>Fecha de Alta</th>
            </tr>
        </thead>
        <tbody>
            <!-- "th" es la inicialización de Thymeleaf
                 "each" es como un forEach mejorado para recuperar los datos del parámetro 
                 que enviamos desde el EmpleadoController como model.addAtributte
                 {} aquello que va dentro de llaves se considera Spring Expresion Language  -->
            <tr th:each="empleado:${empleados}">
                <td th:text="${empleado.nombre}"></td>
                <td th:text="${empleado.primerApellido}"></td>
                <td th:text="${empleado.segundoApellido}"></td>
                <td th:text="${empleado.genero}"></td>
                <td th:text="${empleado.salario}"></td>
                <td th:text="${empleado.fechaAlta}"></td>
            </tr>
        </tbody>
    </table>
</body>

</html>
