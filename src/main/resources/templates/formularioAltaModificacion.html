<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Alta/Modificación</title>
</head>
<body>
    <h1>Gestión de Empleados</h1>

    
    <fieldset>
        <legend>Formulario de Alta o Modificación</legend>
        
        <form action="" method="post">
            <input type="hidden" th:field="*{id}">    
            <div>
                <!-- el * en Thymeleaf  -->
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" required th:field="*{nombre}">
            </div>
            <div>
                <label for="primerApellido">Primer Apellido</label>
                <input type="text" id="primerApellido" name="primerApellido" required>
            </div>
            <div>
                <label for="segundoApellido">Segundo Apellido</label>
                <input type="text" id="segundoApellido" name="segundoApellido" required>
            </div>
            <div>
                <fieldset>
                    <legend>Genero:</legend>
                    <label for="hombre"> Hombre</label>
                    <input type="radio" id="hombre" name="genero" value="HOMBRE">

                    <label for="mujer">Mujer</label>
                    <input type="radio" name="genero" id="mujer" value="MUJER">

                    <label for="otro">Otro</label>
                    <input type="radio" name="genero" id="otro" value="OTRO">
                </fieldset>
            </div>
            <div>
                <label for="salario">Salario:</label>
                <input type="text" name="salario" id="salario" >
            </div>
            <div>
                <label for="fechaAlta">Fecha de Alta:</label>
                <input type="date" name="fechaAlta" id="fechaAlta">
            </div>
            <div>
                <label for="numerosTelefono">Telefonos</label>
                <input type="text" name="numerosTelefono" id="numerosTelefono" placeholder="Uno o varios separados por ;">
            </div>
            <div>
                <label for="direccionesCorreo">Correos</label>
                <input type="text" name="direccionesCorreo" id="direccionesCorreo" placeholder="Uno o varios separados por ;">
            </div>
            <div>
                <label for="departamentos">Departamento:</label>
                <select name="departamentos" id="departamentos">
                    <option></option>
                    <option th:each="dpto:${departamentos}" th:value="${dpto.id}" th:text="${dpto.nombre}"></option>
                </select>
            </div>

    </form>
        </fieldset>

</body>
</html>
